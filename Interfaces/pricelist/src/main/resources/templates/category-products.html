<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категория - Прайс-лист</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/home" class="brand">Прайс-лист</a>
            <nav class="main-nav">
                <a href="/home">Главная</a>
                <a href="/products/search">Поиск товаров</a>
                <a href="/categories/view">Категории</a>
                <th:block sec:authorize="hasRole('ADMIN')">
                    <a href="/categories">Управление категориями</a>
                    <a href="/products/add">Добавить товар</a>
                    <a href="/users/manage">Пользователи</a>
                </th:block>
            </nav>
            <div class="userbar">
                <th:block sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn btn-primary">Войти</a>
                </th:block>
                <th:block sec:authorize="isAuthenticated()">
                    <span sec:authentication="name">Гость</span>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-secondary">Выход</button>
                    </form>
                </th:block>
            </div>
        </div>
    </header>

    <main class="page">
        <div class="page-header">
            <h1 class="page-title" th:text="${category.name}">Название категории</h1>
            <a href="/categories/view" class="btn btn-secondary">Назад</a>
        </div>

        <div class="card" style="margin-bottom: 16px;" th:if="${category.description}">
            <p class="muted" style="margin: 0;" th:text="${category.description}">Описание категории</p>
        </div>

        <div class="card">
            <div th:if="${#lists.isEmpty(products)}" class="empty">В этой категории нет товаров</div>

            <div th:if="${not #lists.isEmpty(products)}" class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Артикул</th>
                            <th>Название</th>
                            <th class="text-right">Цена</th>
                            <th class="text-right">На складе</th>
                            <th>Описание</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td class="muted" th:text="${product.sku}">—</td>
                            <td style="font-weight: 500;" th:text="${product.name}">Название</td>
                            <td class="text-right" th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</td>
                            <td class="text-right" th:text="${product.stockQuantity}">0</td>
                            <td class="muted" th:text="${product.description}">Описание</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            &copy; 2026 Прайс-лист
        </div>
    </footer>
</body>
</html>
