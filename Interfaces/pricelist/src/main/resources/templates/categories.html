<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Категории - Прайс-лист</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/home" class="brand">Прайс-лист</a>
            <nav class="main-nav">
                <a href="/home">Главная</a>
                <a href="/products/search">Поиск товаров</a>
                <a href="/categories/view">Категории</a>
                <a href="/categories">Управление</a>
                <a href="/products/add">Добавить товар</a>
                <a href="/users/manage">Пользователи</a>
            </nav>
            <div class="userbar">
                <span sec:authentication="name">Гость</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-secondary">Выход</button>
                </form>
            </div>
        </div>
    </header>

    <main class="page">
        <div class="page-header">
            <h1 class="page-title">Категории</h1>
            <a href="/home" class="btn btn-secondary">Назад</a>
        </div>

        <div class="card" style="margin-bottom: 16px;">
            <h2 class="card-title" id="formTitle" style="margin-bottom: 12px;">Добавить категорию</h2>
            <form id="categoryForm">
                <input type="hidden" id="categoryId" name="id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="categoryName" class="label">Название <span class="text-danger">*</span></label>
                        <input type="text" id="categoryName" name="name" required
                               class="field" placeholder="Введите название">
                        <div id="nameError" class="error-message"></div>
                        <div id="nameSuccess" class="success-message">Название доступно</div>
                    </div>
                    <div class="form-group">
                        <label for="categoryDescription" class="label">Описание</label>
                        <input type="text" id="categoryDescription" name="description"
                               class="field" placeholder="Введите описание">
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <button type="button" id="clearForm" class="btn btn-secondary">Очистить</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title" style="margin-bottom: 12px;">Существующие категории</h2>

            <div th:if="${#lists.isEmpty(categories)}" class="empty">0 items</div>

            <div th:if="${not #lists.isEmpty(categories)}" class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Название</th>
                        <th>Описание</th>
                        <th class="text-right">Действия</th>
                    </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            &copy; 2024 Прайс-лист
        </div>
    </footer>

    <div id="toast-container"></div>

    <!-- Модальное окно для просмотра товаров категории -->
    <div id="productsModal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2 class="modal-title" id="modalCategoryName">Товары категории</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalProductsBody">
                <div class="empty">Загрузка...</div>
            </div>
        </div>
    </div>

    <script th:inline="none">
        // CSRF токен
        const csrfToken = document.querySelector('meta[name="_csrf"]') ? document.querySelector('meta[name="_csrf"]').content : '';
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]') ? document.querySelector('meta[name="_csrf_header"]').content : 'X-XSRF-TOKEN';

        const csrfHeaders = {};
        if (csrfToken) {
            csrfHeaders[csrfHeader] = csrfToken;
        }

        // Элементы валидации
        const nameInput = document.getElementById('categoryName');
        const nameError = document.getElementById('nameError');
        const nameSuccess = document.getElementById('nameSuccess');

        let nameValid = true;
        let currentCategoryId = null;
        let namePending = false;

        function validateCategoryName(name) {
            if (!name || name.trim().length === 0) {
                nameError.textContent = 'Название обязательно';
                nameError.classList.add('visible');
                nameSuccess.classList.remove('visible');
                nameInput.classList.add('error');
                nameInput.classList.remove('success');
                nameValid = false;
                return;
            }

            namePending = true;
            const url = '/api/check-category-name?name=' + encodeURIComponent(name.trim()) +
                       (currentCategoryId ? '&excludeId=' + currentCategoryId : '');

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    namePending = false;
                    if (data.exists) {
                        nameError.textContent = 'Категория с таким названием уже существует';
                        nameError.classList.add('visible');
                        nameSuccess.classList.remove('visible');
                        nameInput.classList.add('error');
                        nameInput.classList.remove('success');
                        nameValid = false;
                    } else {
                        nameError.classList.remove('visible');
                        nameSuccess.classList.add('visible');
                        nameInput.classList.remove('error');
                        nameInput.classList.add('success');
                        nameValid = true;
                    }
                })
                .catch(() => {
                    namePending = false;
                    nameError.textContent = 'Ошибка проверки';
                    nameError.classList.add('visible');
                    nameValid = false;
                });
        }

        nameInput.addEventListener('blur', function() {
            if (this.value.trim().length > 0) {
                validateCategoryName(this.value.trim());
            }
        });

        document.getElementById('clearForm').addEventListener('click', function() {
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryDescription').value = '';
            document.getElementById('formTitle').textContent = 'Добавить категорию';
            nameInput.classList.remove('error', 'success');
            nameError.classList.remove('visible');
            nameSuccess.classList.remove('visible');
            currentCategoryId = null;
            nameValid = true;
            namePending = false;
        });

        document.getElementById('categoryForm').addEventListener('submit', function(e) {
            if (namePending) {
                e.preventDefault();
                showToast('Подождите завершения проверки', 'error');
                return;
            }

            if (!nameValid) {
                e.preventDefault();
                showToast('Название категории занято или некорректно', 'error');
                nameInput.focus();
                return;
            }

            const id = document.getElementById('categoryId').value;
            const name = document.getElementById('categoryName').value;
            const description = document.getElementById('categoryDescription').value;

            const formData = new FormData();
            if (id) formData.append('id', id);
            formData.append('name', name);
            formData.append('description', description);

            fetch('/categories/save', {
                method: 'POST',
                body: formData,
                headers: csrfHeaders
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                        document.getElementById('clearForm').click();
                        loadCategories();
                    } else {
                        showToast(data.message, 'error');
                    }
                })
                .catch(error => showToast('Произошла ошибка: ' + error, 'error'));
        });

        function loadCategories() {
            fetch('/categories/list')
                .then(response => response.json())
                .then(categories => {
                    const tbody = document.getElementById('categoryTableBody');
                    tbody.innerHTML = '';
                    categories.forEach(c => {
                        const tr = document.createElement('tr');
                        tr.setAttribute('data-id', c.id);
                        tr.innerHTML = `
                            <td>${c.name}</td>
                            <td>${c.description || '—'}</td>
                            <td class="text-right">
                                <button class="btn btn-secondary btn-view" data-id="${c.id}" data-name="${c.name}" style="padding: 4px 8px; font-size: 12px; margin-right: 8px;">Товары</button>
                                <button class="btn btn-secondary btn-edit-cat" data-id="${c.id}" style="padding: 4px 8px; font-size: 12px; margin-right: 8px;">Изменить</button>
                                <button class="btn btn-danger btn-delete-cat" data-id="${c.id}" style="padding: 4px 8px; font-size: 12px;">Удалить</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Добавляем обработчики
                    document.querySelectorAll('.btn-view').forEach(btn => {
                        btn.addEventListener('click', function() {
                            viewCategoryProducts(this.dataset.id, this.dataset.name);
                        });
                    });
                    document.querySelectorAll('.btn-edit-cat').forEach(btn => {
                        btn.addEventListener('click', function() {
                            editCategory(parseInt(this.dataset.id));
                        });
                    });
                    document.querySelectorAll('.btn-delete-cat').forEach(btn => {
                        btn.addEventListener('click', function() {
                            deleteCategory(parseInt(this.dataset.id));
                        });
                    });
                });
        }

        function viewCategoryProducts(categoryId, categoryName) {
            document.getElementById('modalCategoryName').textContent = 'Товары: ' + categoryName;
            document.getElementById('productsModal')._categoryId = categoryId;
            document.getElementById('productsModal').style.display = 'flex';
            document.getElementById('modalProductsBody').innerHTML = '<div class="empty">Загрузка...</div>';

            fetch('/categories/products/' + categoryId)
                .then(response => response.json())
                .then(products => {
                    const body = document.getElementById('modalProductsBody');
                    if (products.length === 0) {
                        body.innerHTML = '<div class="empty">В этой категории нет товаров</div>';
                        return;
                    }
                    body.innerHTML = `
                        <div class="table-wrap">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th class="text-right">Цена</th>
                                        <th class="text-right">На складе</th>
                                        <th>Описание</th>
                                        <th class="text-right">Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${products.map(p => `
                                        <tr>
                                            <td style="font-weight: 500;">${p.name}</td>
                                            <td class="text-right">${parseFloat(p.price).toFixed(2)} ₽</td>
                                            <td class="text-right">${p.stockQuantity}</td>
                                            <td class="muted">${p.description || '—'}</td>
                                            <td class="text-right">
                                                <button class="btn btn-danger btn-delete-product" data-id="${p.id}" style="padding: 2px 6px; font-size: 11px;">Удалить</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="muted" style="margin-top: 12px;">Всего товаров: ${products.length}</div>
                    `;

                    // Добавляем обработчики для кнопок удаления товаров
                    document.querySelectorAll('.btn-delete-product').forEach(btn => {
                        btn.addEventListener('click', function() {
                            deleteProduct(this.dataset.id);
                        });
                    });
                })
                .catch(error => {
                    document.getElementById('modalProductsBody').innerHTML =
                        '<div class="empty" style="color: #dc2626;">Ошибка загрузки товаров</div>';
                });
        }

        function closeProductsModal() {
            document.getElementById('productsModal').style.display = 'none';
        }

        function deleteProduct(productId) {
            if (!confirm('Вы уверены, что хотите удалить этот товар?')) return;
            fetch('/products/delete/' + productId, {
                method: 'POST'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast('Товар удалён', 'success');
                        // Обновляем список товаров
                        const categoryId = document.getElementById('productsModal')._categoryId;
                        const categoryName = document.getElementById('modalCategoryName').textContent.replace('Товары: ', '');
                        viewCategoryProducts(categoryId, categoryName);
                    } else {
                        showToast(data.message, 'error');
                    }
                })
                .catch(error => showToast('Ошибка: ' + error, 'error'));
        }

        function editCategory(id) {
            currentCategoryId = id;
            fetch('/categories/edit/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('categoryId').value = data.id;
                    document.getElementById('categoryName').value = data.name;
                    document.getElementById('categoryDescription').value = data.description || '';
                    document.getElementById('formTitle').textContent = 'Редактировать категорию';
                    nameInput.classList.remove('error', 'success');
                    nameError.classList.remove('visible');
                    nameSuccess.classList.remove('visible');
                    nameValid = true;
                    namePending = false;
                });
        }

        function deleteCategory(id) {
            if (!confirm('Вы уверены, что хотите удалить эту категорию?')) return;
            fetch('/categories/delete/' + id, {
                method: 'POST',
                headers: csrfHeaders
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                        loadCategories();
                    } else {
                        showToast(data.message, 'error');
                    }
                });
        }

        // Делаем функции глобальными
        window.editCategory = editCategory;
        window.deleteCategory = deleteCategory;
        window.viewCategoryProducts = viewCategoryProducts;
        window.closeProductsModal = closeProductsModal;

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = 'padding: 10px 14px; border-radius: 6px; border: 1px solid; margin-bottom: 8px; font-size: 13px;';
            if (type === 'success') {
                toast.style.background = '#f0fdf4';
                toast.style.borderColor = '#bbf7d0';
                toast.style.color = '#166534';
            } else {
                toast.style.background = '#fef2f2';
                toast.style.borderColor = '#fecaca';
                toast.style.color = '#dc2626';
            }
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeProductsModal();
        });

        // Обработчики для модального окна
        document.querySelector('.modal-backdrop').addEventListener('click', closeProductsModal);
        document.querySelector('.modal-close').addEventListener('click', closeProductsModal);

        // Загружаем категории при старте
        loadCategories();
    </script>
</body>
</html>
