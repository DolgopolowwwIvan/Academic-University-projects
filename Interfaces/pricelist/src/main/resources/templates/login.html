<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Прайс-лист</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-layout">
    <div class="auth-card">
        <a href="/home" class="brand" style="display: block; text-align: center; margin-bottom: 16px;">Прайс-лист</a>
        <h2 class="auth-title">Вход в систему</h2>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="inline-status error">
                Неверный логин или пароль
            </div>

            <div th:if="${param.logout}" class="inline-status success">
                Вы вышли из системы
            </div>

            <div th:if="${param.registered}" class="inline-status success">
                Регистрация успешна. Войдите с вашими данными.
            </div>

            <div class="form-group">
                <label for="username" class="label">Логин</label>
                <input type="text" id="username" name="username" required
                       class="field" placeholder="Введите логин">
            </div>

            <div class="form-group">
                <label for="password" class="label">Пароль</label>
                <input type="password" id="password" name="password" required
                       class="field" placeholder="Введите пароль">
            </div>

            <div class="actions" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Войти</button>
            </div>
        </form>

        <div style="margin-top: 16px; text-align: center;">
            <a href="/home" class="muted">На главную</a>
        </div>

        <div style="margin-top: 16px; text-align: center; padding-top: 16px; border-top: 1px solid var(--border);">
            <span class="muted">Нет аккаунта? </span>
            <a href="/register">Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
