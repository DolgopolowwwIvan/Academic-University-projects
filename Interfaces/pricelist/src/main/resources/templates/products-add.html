<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить товар - Прайс-лист</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="app-shell">
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/home" class="brand">Прайс-лист</a>
            <nav class="main-nav">
                <a href="/home">Главная</a>
                <a href="/products/search">Поиск товаров</a>
                <a href="/categories/view">Категории</a>
                <a href="/categories">Управление</a>
                <a href="/products/add">Добавить товар</a>
                <a href="/users/manage">Пользователи</a>
            </nav>
            <div class="userbar">
                <span sec:authentication="name">Гость</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-secondary">Выход</button>
                </form>
            </div>
        </div>
    </header>

    <main class="page">
        <div class="page-header">
            <h1 class="page-title">Добавить товар</h1>
            <a href="/home" class="btn btn-secondary">Назад</a>
        </div>

        <div th:if="${noCategories}" class="card" style="margin-bottom: 16px;">
            <p class="muted" style="margin: 0; font-size: 13px;">
                Нет доступных категорий. <a href="/categories">Открыть категории</a>
            </p>
        </div>

        <div class="card">
            <form id="productForm">
                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="productCategory" class="label">Категория <span class="text-danger">*</span></label>
                    <select id="productCategory" name="categoryId" required
                            class="select" th:disabled="${noCategories}">
                        <option value="">Выберите категорию</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Категория</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="productSku" class="label">Артикул <span class="text-danger">*</span></label>
                    <input type="text" id="productSku" name="sku" required minlength="1" maxlength="50"
                           class="field" placeholder="Например: SKU-001">
                    <div id="skuError" class="error-message"></div>
                    <div id="skuSuccess" class="success-message">Артикул доступен</div>
                </div>

                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="productName" class="label">Название товара <span class="text-danger">*</span></label>
                    <input type="text" id="productName" name="name" required minlength="1" maxlength="200"
                           class="field" placeholder="Введите название товара">
                    <div id="nameError" class="error-message"></div>
                    <div id="nameSuccess" class="success-message">Название доступно</div>
                </div>

                <div class="form-group" style="margin-bottom: 12px;">
                    <label for="productDescription" class="label">Описание</label>
                    <textarea id="productDescription" name="description" rows="3"
                              class="textarea" placeholder="Введите описание товара"></textarea>
                </div>

                <div class="form-row" style="margin-bottom: 12px;">
                    <div class="form-group">
                        <label for="productPrice" class="label">Цена <span class="text-danger">*</span></label>
                        <input type="number" id="productPrice" name="price" required step="0.01" min="0.01"
                               class="field" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="productStock" class="label">Количество на складе <span class="text-danger">*</span></label>
                        <input type="number" id="productStock" name="stockQuantity" required min="0"
                               class="field" placeholder="0">
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary" th:disabled="${noCategories}">Сохранить</button>
                    <button type="button" id="clearForm" class="btn btn-secondary">Очистить</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            &copy; 2026 Прайс-лист
        </div>
    </footer>

    <div id="toast-container"></div>

    <script th:inline="none">
        // CSRF токен
        const csrfToken = document.querySelector('meta[name="_csrf"]') ? document.querySelector('meta[name="_csrf"]').content : '';
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]') ? document.querySelector('meta[name="_csrf_header"]').content : 'X-XSRF-TOKEN';

        const csrfHeaders = {};
        if (csrfToken) {
            csrfHeaders[csrfHeader] = csrfToken;
        }

        // Элементы валидации
        const skuInput = document.getElementById('productSku');
        const nameInput = document.getElementById('productName');
        const categorySelect = document.getElementById('productCategory');
        const skuError = document.getElementById('skuError');
        const skuSuccess = document.getElementById('skuSuccess');
        const nameError = document.getElementById('nameError');
        const nameSuccess = document.getElementById('nameSuccess');

        let skuValid = true;
        let nameValid = true;
        let skuPending = false;
        let namePending = false;

        function validateSku(sku) {
            if (!sku || sku.trim().length === 0) {
                skuError.textContent = 'Артикул обязателен';
                skuError.classList.add('visible');
                skuSuccess.classList.remove('visible');
                skuInput.classList.add('error');
                skuInput.classList.remove('success');
                skuValid = false;
                return;
            }

            skuPending = true;
            fetch('/api/check-product-sku?sku=' + encodeURIComponent(sku.trim()))
                .then(response => response.json())
                .then(data => {
                    skuPending = false;
                    if (data.exists) {
                        skuError.textContent = 'Этот артикул уже существует';
                        skuError.classList.add('visible');
                        skuSuccess.classList.remove('visible');
                        skuInput.classList.add('error');
                        skuInput.classList.remove('success');
                        skuValid = false;
                    } else {
                        skuError.classList.remove('visible');
                        skuSuccess.classList.add('visible');
                        skuInput.classList.remove('error');
                        skuInput.classList.add('success');
                        skuValid = true;
                    }
                })
                .catch(() => {
                    skuPending = false;
                    skuError.textContent = 'Ошибка проверки';
                    skuError.classList.add('visible');
                    skuValid = false;
                });
        }

        function validateProductName(name) {
            const categoryId = categorySelect.value;
            if (!categoryId) {
                nameError.textContent = 'Сначала выберите категорию';
                nameError.classList.add('visible');
                nameSuccess.classList.remove('visible');
                nameValid = false;
                return;
            }

            if (!name || name.trim().length === 0) {
                nameError.textContent = 'Название обязательно';
                nameError.classList.add('visible');
                nameSuccess.classList.remove('visible');
                nameInput.classList.add('error');
                nameInput.classList.remove('success');
                nameValid = false;
                return;
            }

            namePending = true;
            fetch('/api/check-product-name?name=' + encodeURIComponent(name.trim()) + '&categoryId=' + categoryId)
                .then(response => response.json())
                .then(data => {
                    namePending = false;
                    if (data.exists) {
                        nameError.textContent = 'Товар с таким названием уже существует в этой категории';
                        nameError.classList.add('visible');
                        nameSuccess.classList.remove('visible');
                        nameInput.classList.add('error');
                        nameInput.classList.remove('success');
                        nameValid = false;
                    } else {
                        nameError.classList.remove('visible');
                        nameSuccess.classList.add('visible');
                        nameInput.classList.remove('error');
                        nameInput.classList.add('success');
                        nameValid = true;
                    }
                })
                .catch(() => {
                    namePending = false;
                    nameError.textContent = 'Ошибка проверки';
                    nameError.classList.add('visible');
                    nameValid = false;
                });
        }

        skuInput.addEventListener('blur', function() {
            if (this.value.trim().length > 0) {
                validateSku(this.value.trim());
            }
        });

        nameInput.addEventListener('blur', function() {
            if (this.value.trim().length > 0 && categorySelect.value) {
                validateProductName(this.value.trim());
            }
        });

        categorySelect.addEventListener('change', function() {
            if (nameInput.value.trim() && !namePending) {
                validateProductName(nameInput.value.trim());
            }
        });

        document.getElementById('clearForm').addEventListener('click', function() {
            document.getElementById('productForm').reset();
            document.getElementById('productSku').value = '';
            skuInput.classList.remove('error', 'success');
            nameInput.classList.remove('error', 'success');
            skuError.classList.remove('visible');
            nameError.classList.remove('visible');
            skuSuccess.classList.remove('visible');
            nameSuccess.classList.remove('visible');
            skuValid = true;
            nameValid = true;
            skuPending = false;
            namePending = false;
        });

        document.getElementById('productForm').addEventListener('submit', function(e) {
            if (skuPending || namePending) {
                e.preventDefault();
                showToast('Подождите завершения проверки', 'error');
                return;
            }

            const categoryId = document.getElementById('productCategory').value;
            const sku = document.getElementById('productSku').value;
            const name = document.getElementById('productName').value;
            const description = document.getElementById('productDescription').value;
            const price = document.getElementById('productPrice').value;
            const stockQuantity = document.getElementById('productStock').value;

            if (!categoryId) return showToast('Выберите категорию', 'error');
            if (!skuValid) {
                e.preventDefault();
                showToast('Артикул занят или некорректен', 'error');
                skuInput.focus();
                return;
            }
            if (!nameValid) {
                e.preventDefault();
                showToast('Название товара занято или некорректно', 'error');
                nameInput.focus();
                return;
            }
            if (!price || parseFloat(price) <= 0) return showToast('Введите корректную цену', 'error');
            if (stockQuantity === '' || parseInt(stockQuantity) < 0) return showToast('Введите корректное количество', 'error');

            const formData = new FormData();
            formData.append('categoryId', categoryId);
            formData.append('sku', sku);
            formData.append('name', name);
            formData.append('description', description);
            formData.append('price', price);
            formData.append('stockQuantity', stockQuantity);

            fetch('/products/save', {
                method: 'POST',
                body: formData,
                headers: csrfHeaders
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast(data.message, 'success');
                        document.getElementById('clearForm').click();
                    } else {
                        showToast(data.message, 'error');
                    }
                })
                .catch(error => showToast('Произошла ошибка: ' + error, 'error'));
        });

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = 'padding: 10px 14px; border-radius: 6px; border: 1px solid; margin-bottom: 8px; font-size: 13px;';
            if (type === 'success') {
                toast.style.background = '#f0fdf4';
                toast.style.borderColor = '#bbf7d0';
                toast.style.color = '#166534';
            } else {
                toast.style.background = '#fef2f2';
                toast.style.borderColor = '#fecaca';
                toast.style.color = '#dc2626';
            }
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
